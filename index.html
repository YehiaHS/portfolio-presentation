<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Yehia Salem — Presentation</title>
  <meta name="description" content="Yehia Salem — Portfolio presentation links. E-Portfolio, LinkedIn, Resume, and Showreel." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,700;1,9..144,400&family=Manrope:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg: #0d1410;
      --bg-card: #111c14;
      --ink: #d4e4d8;
      --ink-faint: #5a6a5e;
      --accent: #4a9f62;
      --accent-deep: #2d6b3f;
      --accent-glow: rgba(74, 159, 98, 0.08);
    }

    html, body {
      height: 100%;
      overflow: hidden;
      font-family: 'Manrope', system-ui, sans-serif;
      background: var(--bg);
      color: var(--ink);
    }

    body {
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
    }

    /* Ambient glow */
    body::before {
      content: '';
      position: fixed;
      top: 50%; left: 50%;
      width: 600px; height: 600px;
      transform: translate(-50%, -50%);
      background: radial-gradient(circle, rgba(74,159,98,0.06) 0%, transparent 70%);
      pointer-events: none;
      z-index: 0;
    }

    /* Grain overlay */
    body::after {
      content: '';
      position: fixed;
      inset: 0;
      opacity: 0.03;
      pointer-events: none;
      z-index: 100;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E");
      background-size: 128px 128px;
    }

    .container {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 560px;
      padding: 2rem 1.5rem;
      text-align: center;
    }

    /* Decorative serial number */
    .serial {
      font-family: 'Fraunces', Georgia, serif;
      font-size: clamp(8rem, 20vw, 14rem);
      font-weight: 700;
      line-height: 0.8;
      color: var(--ink);
      opacity: 0.018;
      position: fixed;
      top: -0.5rem;
      right: 2rem;
      pointer-events: none;
      user-select: none;
      z-index: 0;
    }

    /* Header */
    .hello {
      font-family: 'Fraunces', Georgia, serif;
      font-style: italic;
      font-size: clamp(1rem, 2.5vw, 1.3rem);
      color: var(--ink-faint);
      margin-bottom: 0.25rem;
      opacity: 0;
      animation: fadeUp 0.8s 0.2s ease forwards;
    }

    .name {
      font-family: 'Fraunces', Georgia, serif;
      font-size: clamp(3rem, 8vw, 4.5rem);
      font-weight: 700;
      letter-spacing: -0.04em;
      line-height: 0.85;
      margin-bottom: 0.15rem;
      opacity: 0;
      animation: fadeUp 0.8s 0.35s ease forwards;
    }

    .name-accent {
      font-family: 'Fraunces', Georgia, serif;
      font-style: italic;
      font-size: clamp(2.8rem, 7.5vw, 4rem);
      color: var(--accent);
      letter-spacing: -0.03em;
      line-height: 0.85;
      margin-bottom: 1.5rem;
      opacity: 0;
      animation: fadeUp 0.8s 0.45s ease forwards;
    }

    .divider {
      width: 48px;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--accent), transparent);
      margin: 0 auto 1.2rem;
      opacity: 0;
      animation: fadeUp 0.6s 0.55s ease forwards;
    }

    .subtitle {
      font-size: 0.65rem;
      font-weight: 500;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: var(--ink-faint);
      margin-bottom: 2.5rem;
      opacity: 0;
      animation: fadeUp 0.6s 0.6s ease forwards;
    }

    /* Link cards */
    .links {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0.75rem;
      opacity: 0;
      animation: fadeUp 0.8s 0.7s ease forwards;
    }

    .link-card {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 0.6rem;
      padding: 1.5rem 1rem;
      border-radius: 12px;
      border: 1px solid rgba(74, 159, 98, 0.15);
      background: var(--bg-card);
      text-decoration: none;
      color: var(--ink);
      transition: all 0.4s cubic-bezier(0.22, 1, 0.36, 1);
      position: relative;
      overflow: hidden;
    }

    .link-card::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, rgba(74,159,98,0.06) 0%, transparent 60%);
      opacity: 0;
      transition: opacity 0.4s ease;
    }

    .link-card:hover {
      border-color: rgba(74, 159, 98, 0.4);
      transform: translateY(-3px);
      box-shadow: 0 20px 60px -15px rgba(0, 0, 0, 0.5);
    }

    .link-card:hover::before {
      opacity: 1;
    }

    .link-card:hover .link-icon {
      transform: scale(1.1);
      color: var(--accent);
    }

    .link-card:hover .link-label {
      color: var(--ink);
    }

    .link-icon {
      font-size: 1.5rem;
      line-height: 1;
      transition: all 0.4s cubic-bezier(0.22, 1, 0.36, 1);
      position: relative;
      z-index: 1;
    }

    .link-label {
      font-size: 0.6rem;
      font-weight: 600;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--ink-faint);
      transition: color 0.3s ease;
      position: relative;
      z-index: 1;
    }

    /* Footer */
    .footer {
      margin-top: 2rem;
      font-size: 0.55rem;
      letter-spacing: 0.15em;
      color: var(--ink-faint);
      opacity: 0;
      animation: fadeUp 0.6s 0.9s ease forwards;
    }

    /* Animations */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(12px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* Mobile adjustments */
    @media (max-width: 480px) {
      .container { padding: 1.5rem 1.25rem; }
      .links { gap: 0.6rem; }
      .link-card { padding: 1.25rem 0.75rem; }
    }

    @media (max-height: 600px) {
      .name { font-size: 2.5rem; }
      .name-accent { font-size: 2.2rem; margin-bottom: 1rem; }
      .subtitle { margin-bottom: 1.5rem; }
      .link-card { padding: 1rem 0.75rem; }
    }
  </style>
</head>
<body>

  <div class="serial">01</div>

  <div class="container">
    <p class="hello">Hello, I'm</p>
    <h1 class="name">Yehia</h1>
    <p class="name-accent">Salem</p>
    <div class="divider"></div>
    <p class="subtitle">Creative Portfolio Presentation</p>

    <div class="links">
      <a href="https://yehiahs.github.io/portfolio/" target="_blank" rel="noopener" class="link-card" id="link-portfolio">
        <span class="link-icon">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="3" width="20" height="14" rx="2"/><line x1="8" y1="21" x2="16" y2="21"/><line x1="12" y1="17" x2="12" y2="21"/></svg>
        </span>
        <span class="link-label">E-Portfolio</span>
      </a>

      <a href="https://www.linkedin.com/in/yehia-salem-85a367405?trk=contact-info" target="_blank" rel="noopener" class="link-card" id="link-linkedin">
        <span class="link-icon">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M16 8a6 6 0 0 1 6 6v7h-4v-7a2 2 0 0 0-2-2 2 2 0 0 0-2 2v7h-4v-7a6 6 0 0 1 6-6z"/><rect x="2" y="9" width="4" height="12"/><circle cx="4" cy="4" r="2"/></svg>
        </span>
        <span class="link-label">LinkedIn</span>
      </a>

      <a href="Yehia_Salem_Resume.pdf" target="_blank" rel="noopener" class="link-card" id="link-resume">
        <span class="link-icon">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10 9 9 9 8 9"/></svg>
        </span>
        <span class="link-label">Resume</span>
      </a>

      <a href="https://drive.google.com/file/d/11jd-ODs1Ku42kJMiD9yCzHZBcapOsQRy/view?usp=drive_link" target="_blank" rel="noopener" class="link-card" id="link-showreel">
        <span class="link-icon">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><polygon points="5 3 19 12 5 21 5 3"/></svg>
        </span>
        <span class="link-label">Showreel</span>
      </a>
    </div>

    <p class="footer">IMC &amp; CS — British University in Egypt</p>
  </div>

</body>
</html>
